name: Build Mobile Frontend

on:
  push:
    branches:
      - "**"
      # - main
  workflow_dispatch:
  # release:
  #   types:
  #     - published

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # directory where the React Native project lives
  PROJECT_DIR: frontend/ailixir

  NODE_VERSION: "24"
  JAVA_VERSION: "17"

jobs:
  android-build:
    name: Android Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Validate project directory
        run: |
          set -euo pipefail
          if [[ ! -d "${PROJECT_DIR}" ]]; then
            echo "Project directory not found: ${PROJECT_DIR}"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          npm ci

      - name: Lint
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm run lint

      - name: Prebuild Android app directory using Expo when needed
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          if [[ ! -d android ]]; then
            CI=1 npx expo prebuild --platform android --non-interactive
          fi

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Fix Gradle wrapper permissions
        run: chmod +x "${PROJECT_DIR}/android/gradlew"

      - name: Build Android release artifacts
        working-directory: ${{ env.PROJECT_DIR }}/android
        run: |
          set -euo pipefail
          ./gradlew assembleRelease bundleRelease --no-daemon --warning-mode=all --build-cache --stacktrace

      - name: Upload Android artifacts (.apk)
        uses: actions/upload-artifact@v7
        with:
          name: android-release-artifacts
          path: |
            ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      # - name: Upload Android artifacts (.aab)
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: android-release-artifacts
      #     path: |
      #       ${{ env.PROJECT_DIR }}/android/app/build/outputs/bundle/release/*.aab
      #     if-no-files-found: error
      #     compression-level: 0
      #     retention-days: 7

  ios-build:
    name: iOS Build
    runs-on: macos-26
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    env:
      PROJECT_DIR: frontend/ailixir
      NODE_VERSION: "24"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Show Xcode version
        run: |
          set -euo pipefail
          xcodebuild -version
          sw_vers

      - name: Validate project directory
        run: |
          set -euo pipefail
          if [[ ! -d "${PROJECT_DIR}" ]]; then
            echo "Project directory not found: ${PROJECT_DIR}"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.PROJECT_DIR }}/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          npm ci

      - name: Inspect Expo dependency alignment
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -euo pipefail
          npx expo-doctor || true
          npm ls expo expo-modules-core react-native || true

      - name: Lint
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm run lint

      - name: Prebuild iOS app directory when needed
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CI: "1"
        run: |
          set -euo pipefail
          if [[ ! -d ios ]]; then
            npx expo prebuild --platform ios --non-interactive
          fi

      - name: Set up Ruby for CocoaPods
        if: ${{ hashFiles(format('{0}/ios/Gemfile', env.PROJECT_DIR)) != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ${{ env.PROJECT_DIR }}/ios

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.PROJECT_DIR }}/ios
        run: |
          set -euo pipefail

          if [[ -f Gemfile ]]; then
            if [[ -f Podfile.lock ]]; then
              bundle exec pod install --deployment
            else
              bundle exec pod install --repo-update
            fi
          else
            sudo gem install cocoapods -N
            if [[ -f Podfile.lock ]]; then
              pod install --deployment
            else
              pod install --repo-update
            fi
          fi

      - name: Resolve iOS project file and scheme
        run: |
          set -euo pipefail

          ABS_IOS_DIR="$(cd "${PROJECT_DIR}/ios" && pwd)"

          WORKSPACE="$(find "${ABS_IOS_DIR}" -maxdepth 1 -name '*.xcworkspace' | head -n 1 || true)"
          PROJECT="$(find "${ABS_IOS_DIR}" -maxdepth 1 -name '*.xcodeproj' | head -n 1 || true)"

          if [[ -n "${WORKSPACE}" ]]; then
            BUILD_FILE_TYPE="workspace"
            BUILD_FILE_PATH="${WORKSPACE}"
            SCHEME="$(xcodebuild -list -json -workspace "${WORKSPACE}" | python3 -c 'import json, sys; data = json.load(sys.stdin); print((data.get("workspace", {}).get("schemes") or [""])[0])')"
          elif [[ -n "${PROJECT}" ]]; then
            BUILD_FILE_TYPE="project"
            BUILD_FILE_PATH="${PROJECT}"
            SCHEME="$(xcodebuild -list -json -project "${PROJECT}" | python3 -c 'import json, sys; data = json.load(sys.stdin); print((data.get("project", {}).get("schemes") or [""])[0])')"
          else
            echo "No .xcworkspace or .xcodeproj found in ${ABS_IOS_DIR}"
            exit 1
          fi

          if [[ -z "${SCHEME}" ]]; then
            echo "No shared Xcode scheme found."
            exit 1
          fi

          {
            echo "IOS_BUILD_FILE_TYPE=${BUILD_FILE_TYPE}"
            echo "IOS_BUILD_FILE_PATH=${BUILD_FILE_PATH}"
            echo "IOS_SCHEME_RESOLVED=${SCHEME}"
          } >> "${GITHUB_ENV}"

      - name: Build iOS app for Device without signing
        working-directory: ${{ env.PROJECT_DIR }}/ios
        env:
          CI: "1"
        run: |
          set -euo pipefail

          if [[ "${IOS_BUILD_FILE_TYPE}" == "workspace" ]]; then
            TARGET_ARGS=(-workspace "${IOS_BUILD_FILE_PATH}")
          else
            TARGET_ARGS=(-project "${IOS_BUILD_FILE_PATH}")
          fi

          xcodebuild \
            "${TARGET_ARGS[@]}" \
            -scheme "${IOS_SCHEME_RESOLVED}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${PWD}/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        working-directory: ${{ env.PROJECT_DIR }}/ios
        run: |
          set -euo pipefail

          APP_DIR=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)
          if [[ -z "${APP_DIR}" ]]; then
            echo "Error: No .app bundle found in Release-iphoneos"
            exit 1
          fi

          echo "Found app bundle: ${APP_DIR}"
          mkdir -p Payload
          cp -r "${APP_DIR}" Payload/
          zip -r unsigned-app.ipa Payload
          echo "Successfully created unsigned-app.ipa"

      - name: Upload unsigned iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-unsigned-ipa
          path: ${{ env.PROJECT_DIR }}/ios/unsigned-app.ipa
          if-no-files-found: error
          retention-days: 7
